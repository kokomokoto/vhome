<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VHome</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <video
    id="bg-video"
    src="https://pub-2283767efb1f4ff69d1896f9c6b1bd2e.r2.dev/kepulia%20dancing.mp4"
    autoplay
    loop
    muted
    playsinline
    preload="auto"
  ></video>

  <script>
    const video = document.getElementById("bg-video");
    let soundOn = false;
    let videoReady = false;

    function applySound() {
      video.muted = false;
      video.volume = 1;
    }

    video.addEventListener("playing", () => {
      videoReady = true;
      if (soundOn) applySound();
    }, { once: true });

    function requestSound() {
      if (soundOn) return;
      soundOn = true;
      if (videoReady) applySound();
    }

    // Chrome freezes if sound is enabled on mouse move — click/tap only.
    document.addEventListener("pointerdown", requestSound, { once: true, passive: true });
  </script>
</body>
</html>
