<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VHome</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <video
    id="bg-video"
    src="https://pub-2283767efb1f4ff69d1896f9c6b1bd2e.r2.dev/kepulia%20dancing.mp4"
    loop
    muted
    playsinline
    preload="auto"
  ></video>

  <script>
    const video = document.getElementById("bg-video");
    let soundOn = false;
    let playing = false;

    function startVideo() {
      if (playing) return;
      playing = true;
      video.muted = true;
      video.play().catch(() => {});
    }

    function enableSound() {
      if (soundOn) return;
      soundOn = true;
      video.muted = false;
      video.volume = 1;
    }

    video.addEventListener("canplay", startVideo, { once: true });

    window.addEventListener("pointermove", enableSound, { once: true, passive: true });
  </script>
</body>
</html>
