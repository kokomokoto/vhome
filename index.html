<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VHome</title>
  <meta name="description" content="VHome" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <video
    id="bg-video"
    src="https://pub-2283767efb1f4ff69d1896f9c6b1bd2e.r2.dev/kepulia%20dancing.mp4"
    autoplay
    loop
    playsinline
    preload="auto"
  ></video>

  <button id="unmute-btn" type="button" hidden>
    <span class="unmute-icon" aria-hidden="true">🔊</span>
    ხმის ჩართვა
  </button>

  <script>
    const video = document.getElementById("bg-video");
    const unmuteBtn = document.getElementById("unmute-btn");

    async function tryPlayWithSound() {
      video.muted = false;
      video.volume = 1;
      try {
        await video.play();
        unmuteBtn.hidden = true;
      } catch (err) {
        // Browser blocked sound autoplay — start muted, offer manual unmute.
        video.muted = true;
        try { await video.play(); } catch (e) {}
        unmuteBtn.hidden = false;
      }
    }

    function enableSound() {
      video.muted = false;
      video.volume = 1;
      video.play();
      unmuteBtn.hidden = true;
    }

    unmuteBtn.addEventListener("click", enableSound);

    // First interaction anywhere also unmutes.
    ["click", "keydown", "touchstart"].forEach((evt) => {
      document.addEventListener(
        evt,
        () => {
          if (video.muted) enableSound();
        },
        { once: true }
      );
    });

    // Safety net: keep looping even if 'loop' attribute is ignored.
    video.addEventListener("ended", () => {
      video.currentTime = 0;
      video.play();
    });

    tryPlayWithSound();
  </script>
</body>
</html>
